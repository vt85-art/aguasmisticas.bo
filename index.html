<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ojo del Inca</title>

<style>
body {margin:0;font-family:'Segoe UI';color:white;background:black;}

/* PORTADA */
.hero {
height:100vh;
background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.7)),
url("ojo del inca con montanas y relieve de fondo.jpg") center/cover;
display:flex;justify-content:center;align-items:center;text-align:center;
}
.hero h1 {font-size:50px;}

/* MENÚ */
nav {
position:fixed;width:100%;top:0;
background:rgba(0,0,0,0.6);
padding:10px;text-align:center;
}

/* BANDERAS */
.flags img {
width:35px;
margin:5px;
cursor:pointer;
border-radius:5px;
}

/* SECCIONES */
.section {padding:80px 20px;text-align:center;}

.grid {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:10px;
padding:20px;
}
.grid img {
width:100%;height:250px;
object-fit:cover;border-radius:10px;
}

/* WHATSAPP */
.whatsapp {
position:fixed;bottom:20px;right:20px;
background:#25D366;padding:15px;border-radius:50%;
color:white;font-size:20px;text-decoration:none;
}
</style>
</head>

<body>

<!-- MENÚ + IDIOMAS -->
<nav>
<div class="flags">
<img src="Flag_of_Spain.svg.png" onclick="cambiarIdioma('es')">
<img src="banderaidiomaingles.jpg" onclick="cambiarIdioma('en')">
<img src="Flag_of_France.svg.webp" onclick="cambiarIdioma('fr')">
<img src="Flag_of_Italy.svg" onclick="cambiarIdioma('it')">
<img src="Flag_of_Brazil.svg.webp" onclick="cambiarIdioma('pt')">
<img src="flagwhipalaaymara.jpg" onclick="cambiarIdioma('ay')">
<img src="flagwiphalaquechua.jpg" onclick="cambiarIdioma('qu')">
</div>
</nav>

<!-- PORTADA -->
<div class="hero">
<h1 id="titulo">Ojo del Inca 🌿</h1>
</div>

<!-- INFO -->
<div class="section">
<h2 id="subtitulo">Experiencia única</h2>
<p id="descripcion">
Relájate en aguas termales ancestrales rodeado de montañas.
</p>
</div>

<!-- GALERÍA -->
<div class="section">
<h2>Galería</h2>

<div class="grid">
<img src="mujer de espaldas disfrutando de las aguas termales con paisaje de fondo.jpg">
<img src="foto de paisaje de fondo con personas en las aguas termales.jpg">
<img src="foto paisaje de mujer banandose en la piscina al aire libre.jpg">
<img src="foto panoramica hombre mirando paisaje ojo del inca.jpg">
</div>

</div>

<!-- RESERVA -->
<div class="section">
<h2 id="reserva">Reserva tu experiencia</h2>
<button onclick="window.open('https://wa.me/59170123456')">
Reservar
</button>
</div>

<!-- WHATSAPP -->
<a href="https://wa.me/59170123456" class="whatsapp">💬</a>

const textos = {

titulo:"Ojo del Inca 🌿",
subtitulo:"Experiencia única",

reserva:"Reserva tu experiencia"
},
en: {
titulo:"Inca Eye 🌿",
subtitulo:"Unique experience",

reserva:"Book your experience"
},
fr: {
titulo:"Œil de l'Inca 🌿",
subtitulo:"Expérience unique",
descripcion:"Détendez-vous dans des eaux thermales entourées de montagnes.",
reserva:"Réserver"
},
it: {

function cambiarIdioma(lang){
document.getElementById("titulo").innerText = textos[lang].titulo;

</body>
</html>
