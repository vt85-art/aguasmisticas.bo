<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ojo del Inca</title>

<style>
body {margin:0;font-family:'Segoe UI';color:white;background:black;}

/* PORTADA */
.hero {
height:100vh;
background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.7)),
url("ojo del inca con montanas y relieve de fondo.jpg") center/cover;
display:flex;justify-content:center;align-items:center;text-align:center;
}
.hero h1 {font-size:50px;}

/* MENÚ */
nav {
position:fixed;width:100%;top:0;
background:rgba(0,0,0,0.6);
padding:15px;text-align:center;
}
nav a {color:white;margin:10px;text-decoration:none;}

/* SECCIONES */
.section {padding:80px 20px;text-align:center;}

.bg1 {
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.8)),
url("Laguna-Tarapaya.jpg") center/cover;
}

.bg2 {
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.8)),
url("foto de paisaje de fondo con personas en las aguas termales.jpg") center/cover;
}

/* GALERÍA */
.grid {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:10px;
padding:20px;
}
.grid img {
width:100%;
height:250px;
object-fit:cover;
border-radius:10px;
}

/* BOTÓN */
button {
background:#00a86b;color:white;
padding:12px 25px;border:none;
border-radius:25px;
font-size:16px;
}

/* WHATSAPP */
.whatsapp {
position:fixed;bottom:20px;right:20px;
background:#25D366;padding:15px;border-radius:50%;
color:white;font-size:20px;text-decoration:none;
}

/* RESPONSIVE */
@media(max-width:600px){
.hero h1{font-size:28px;}
}
</style>
</head>

<body>

<!-- MENÚ -->
<nav>
<a href="#info">Destino</a>
<a href="#galeria">Galería</a>
<a href="#reserva">Reservas</a>
</nav>

<!-- PORTADA -->
<div class="hero">
<h1>Ojo del Inca 🌿</h1>
</div>

<!-- INFO -->
<div class="section bg1">
<h2>Experiencia única</h2>
<p>
Relájate en aguas termales ancestrales rodeado de montañas,
historia y energía natural.
</p>
</div>

<!-- GALERÍA -->
<div class="section" id="galeria">
<h2>Galería</h2>

<div class="grid">
<img src="mujer de espaldas disfrutando de las aguas termales con paisaje de fondo.jpg">
<img src="foto de paisaje de fondo con personas en las aguas termales.jpg">
<img src="foto paisaje de mujer banandose en la piscina al aire libre.jpg">
<img src="foto panoramica hombre mirando paisaje ojo del inca.jpg">
<img src="Laguna-Tarapaya.jpg">
<img src="Can-you-swim-in-the-Ojo-del-Inca.jpg">
<img src="Directions-to-Ojo-del-Inca-Potosi.jpg">
<img src="kalapurka platillo sopa potosi.jpg">
</div>

</div>

<!-- RESERVAS -->
<div class="section bg2" id="reserva">
<h2>Reserva tu experiencia</h2>
<p>Vive una noche mágica en el Ojo del Inca</p>

<button onclick="window.open('https://wa.me/59170123456')">
Reservar por WhatsApp
</button>

</div>

<!-- WHATSAPP FLOTANTE -->
<a href="https://wa.me/59170123456" class="whatsapp">💬</a>

</body>
</html>
