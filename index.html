<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ojo del Inca</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    color:white;
}

/* FONDO */
.hero {
    height:100vh;
    background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)),
    url("foto1.jpg") center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1 {
    font-size:50px;
}

/* MENÚ */
nav {
    position:fixed;
    top:0;
    width:100%;
    background:rgba(0,0,0,0.6);
    padding:15px;
    text-align:center;
}

nav a {
    color:white;
    margin:10px;
    text-decoration:none;
}

/* IDIOMA */
select {
    padding:5px;
    border-radius:5px;
}

/* SECCIÓN */
.section {
    padding:80px 20px;
    background:#111;
}

/* ANIMACIÓN */
.fade {
    opacity:0;
    transform:translateY(30px);
    transition:1s;
}
.fade.visible {
    opacity:1;
    transform:translateY(0);
}
</style>

</head>

<body>

<!-- MENÚ -->
<nav>
<a href="#info">Info</a>
<a href="#reserva">Reserva</a>

<select onchange="cambiarIdioma(this.value)">
<option value="es">ES</option>
<option value="en">EN</option>
<option value="fr">FR</option>
<option value="it">IT</option>
<option value="pt">PT</option>
<option value="ay">AY</option>
<option value="qu">QU</option>
</select>
</nav>

<!-- PORTADA -->
<div class="hero">
<h1 id="titulo">Ojo del Inca</h1>
</div>

<!-- INFO -->
<div class="section fade">
<p id="descripcion">
Destino geotérmico único en Bolivia con aguas termales y energía ancestral.
</p>
</div>

<!-- RESERVA -->
<div class="section fade">
<h2 id="reservaText">Reservar experiencia</h2>
<button>Reservar</button>
</div>

<!-- SCRIPT IDIOMA -->
<script>
const textos = {
es: {
titulo: "Ojo del Inca",
descripcion: "Destino geotérmico único en Bolivia con aguas termales.",
reserva: "Reservar experiencia"
},
en: {
titulo: "Inca Eye",
descripcion: "Unique geothermal destination in Bolivia.",
reserva: "Book experience"
},
fr: {
titulo: "Œil de l'Inca",
descripcion: "Destination géothermique unique en Bolivie.",
reserva: "Réserver"
},
it: {
titulo: "Occhio dell'Inca",
descripcion: "Destinazione geotermica unica in Bolivia.",
reserva: "Prenota"
},
pt: {
titulo: "Olho do Inca",
descripcion: "Destino geotérmico único na Bolívia.",
reserva: "Reservar"
},
ay: {
titulo: "Inka Nayra",
descripcion: "Bolivia markan uñt'ata uma jalsu.",
reserva: "Reserva luraña"
},
qu: {
titulo: "Inka Ñawi",
descripcion: "Bolivia suyupi qochamanta yaku.",
reserva: "Reserva ruwana"
}
};

function cambiarIdioma(lang){
document.getElementById("titulo").innerText = textos[lang].titulo;
document.getElementById("descripcion").innerText = textos[lang].descripcion;
document.getElementById("reservaText").innerText = textos[lang].reserva;
}

/* ANIMACIÓN */
const fades = document.querySelectorAll('.fade');
window.addEventListener('scroll', () => {
    fades.forEach(el => {
        if(el.getBoundingClientRect().top < window.innerHeight - 50){
            el.classList.add('visible');
        }
    });
});
</script>

</body>
</html>
