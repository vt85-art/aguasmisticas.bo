<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ojo del Inca - Turismo</title>

<style>
body {margin:0;font-family:Arial;background:#f5f5f5;}

/* PORTADA */
.hero {
    background:url("https://media-cdn.tripadvisor.com/media/photo-s/09/6a/5b/78/ojo-del-inca.jpg") center/cover;
    height:100vh;display:flex;align-items:center;justify-content:center;
    color:white;text-align:center;
}
.hero h1 {background:rgba(0,0,0,0.6);padding:20px;}

/* MENÚ */
nav {background:#111;padding:15px;text-align:center;position:sticky;top:0;}
nav a {color:white;margin:10px;text-decoration:none;}

/* SECCIONES */
section {padding:50px 20px;}
.card {
    background:white;padding:25px;margin:20px auto;
    max-width:900px;border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* GALERÍA INSTAGRAM */
.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:10px;
}
.grid img {
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:10px;
}

/* BOTÓN */
button {
    background:#00a86b;color:white;
    padding:10px 20px;border:none;
    border-radius:20px;
}

/* WHATSAPP FLOTANTE */
.whatsapp {
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:white;
    padding:15px;
    border-radius:50%;
    font-size:20px;
    text-decoration:none;
}

/* RESPONSIVE */
@media(max-width:600px){
    .hero h1{font-size:22px;}
}
</style>
</head>

<body>

<!-- PORTADA -->
<div class="hero">
    <h1>Ojo del Inca 🌿<br>Ruta Geotérmica Ancestral</h1>
</div>

<!-- MENÚ -->
<nav>
<a href="#destino">Destino</a>
<a href="#galeria">Galería</a>
<a href="#reserva">Reservas</a>
<a href="#mapa">Mapa</a>
</nav>

<!-- DESTINO -->
<section id="destino">
<div class="card">
<h2>Sobre el destino</h2>
<p>
El Ojo del Inca es una laguna geotérmica en Tarapaya, Potosí,
con aguas minerales y un fuerte valor cultural ancestral.
</p>
</div>
</section>

<!-- GALERÍA INSTAGRAM -->
<section id="galeria">
<div class="card">
<h2>Galería</h2>

<div class="grid">
<img src="https://media-cdn.tripadvisor.com/media/photo-s/09/6a/5b/78/ojo-del-inca.jpg">
<img src="https://media-cdn.tripadvisor.com/media/photo-s/0a/89/52/68/ojo-del-inca.jpg">
<img src="https://media-cdn.tripadvisor.com/media/photo-s/04/0b/5f/5e/ojo-del-inca.jpg">
<img src="https://media-cdn.tripadvisor.com/media/photo-s/0d/7c/0b/5f/ojo-del-inca.jpg">
</div>

</div>
</section>

<!-- RESERVAS -->
<section id="reserva">
<div class="card">
<h2>Reservar experiencia</h2>

<form>
<input type="text" placeholder="Nombre" style="width:100%;padding:10px;margin:5px;">
<input type="email" placeholder="Correo" style="width:100%;padding:10px;margin:5px;">
<input type="date" style="width:100%;padding:10px;margin:5px;">
<textarea placeholder="Mensaje" style="width:100%;padding:10px;margin:5px;"></textarea>

<button type="submit">Reservar</button>
</form>

<p>Precio: 585 Bs por persona</p>

</div>
</section>

<!-- MAPA -->
<section id="mapa">
<div class="card">
<h2>Ubicación</h2>

<iframe src="https://www.google.com/maps?q=Ojo+del+Inca+Potosi&output=embed"
width="100%" height="300" style="border:0;"></iframe>

</div>
</section>

<!-- WHATSAPP FLOTANTE -->
<a href="https://wa.me/59170123456" class="whatsapp">💬</a>

</body>
</html>
